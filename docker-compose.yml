version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: playto_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python ledger/seed.py &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=playto_payout.settings
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/playto_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    command: celery -A playto_payout worker -l info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=playto_payout.settings
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/playto_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    command: celery -A playto_payout beat -l info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=playto_payout.settings
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/playto_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - web

volumes:
  postgres_data:
