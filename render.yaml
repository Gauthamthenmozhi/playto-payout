databases:
  - name: playto-db
    databaseName: playto_db
    plan: free

services:
  - type: redis
    name: playto-redis
    plan: free
    ipAllowList: []

  - type: web
    name: playto-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: playto_payout.settings
      - key: PYTHON_VERSION
        value: 3.11.0
